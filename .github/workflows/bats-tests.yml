name: BATS Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run BATS tests
        run: |
          make test
